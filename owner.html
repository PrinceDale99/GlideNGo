<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="TRAXHAUL Owner View — Live transparency dashboard for company owners to monitor all active deliveries.">
  <title>TRAXHAUL | Owner Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D1117">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── Owner-specific layout ── */
    body { overflow: hidden; }

    .owner-layout {
      display: flex;
      height: calc(100dvh - 60px);
    }

    /* Right panel */
    .owner-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #owner-map {
      flex: 1;
    }

    /* Left sidebar */
    .owner-sidebar {
      width: 320px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .owner-sidebar-scroll {
      flex: 1;
      overflow-y: auto;
    }

    /* Delivery card (owner style) */
    .delivery-row {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
      border-left: 3px solid transparent;
    }
    .delivery-row:hover { background: var(--surface2); }
    .delivery-row.selected {
      background: var(--primary-dim);
      border-left-color: var(--primary);
    }

    /* KPI strip */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .kpi-cell {
      padding: 12px 10px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .kpi-cell:last-child { border-right: none; }

    /* Timeline panel */
    .timeline-panel {
      height: 180px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 16px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .timeline-item:last-child { border-bottom: none; }

    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    /* Mobile */
    @media (max-width: 768px) {
      body { overflow: auto; }
      .owner-layout { flex-direction: column; height: auto; }
      .owner-sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .owner-sidebar-scroll { max-height: 260px; }
      .owner-right { height: 60dvh; }
      #owner-map { height: 100%; }
      .timeline-panel { height: auto; max-height: 200px; }
      .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    }

    /* GMaps dark override */
    .gm-style .gm-style-iw-c {
      background: #161B22 !important;
      border: 1px solid #21262D !important;
      border-radius: 10px !important;
      padding: 0 !important;
    }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .gm-style .gm-style-iw-tc::after { background: #161B22 !important; }
    button.gm-ui-hover-effect { display: none !important; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: var(--radius); font-size: 13px;
      font-weight: 600; opacity: 0; transition: all 0.25s ease; z-index: 999;
      white-space: nowrap; box-shadow: var(--shadow);
    }
    .toast.toast-show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.toast-success { border-color: var(--success); color: var(--success); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <div class="flex items-center gap-12">
    <div class="logo">GlideN<em>GO</em></div>
    <div style="border-left:1px solid var(--border);padding-left:12px;">
      <div class="t-xs t-muted" style="text-transform:uppercase;letter-spacing:.06em;">Owner Dashboard</div>
      <div class="t-xs" style="font-weight:700;margin-top:1px;">Fleet Operations Center</div>
    </div>
  </div>
  <div class="flex items-center gap-8">
    <a href="dispatcher.html" class="btn btn-ghost btn-sm">🚀 Open HQ</a>
    <div class="badge badge-neutral" style="font-size:10px;">READ ONLY</div>
    <div class="connection-pill pill-online" id="conn-pill">Online</div>
  </div>
</header>

<!-- KPI STRIP -->
<div class="kpi-strip">
  <div class="kpi-cell">
    <div style="font-size:22px;font-weight:900;color:var(--text);" id="kpi-active">3</div>
    <div class="t-xs t-muted mt-4">Active</div>
  </div>
  <div class="kpi-cell">
    <div style="font-size:22px;font-weight:900;color:var(--success);" id="kpi-ontime">2</div>
    <div class="t-xs t-muted mt-4">On Time</div>
  </div>
  <div class="kpi-cell">
    <div style="font-size:22px;font-weight:900;color:var(--warning);" id="kpi-delayed">1</div>
    <div class="t-xs t-muted mt-4">Delayed</div>
  </div>
  <div class="kpi-cell">
    <div style="font-size:22px;font-weight:900;color:var(--primary);" id="kpi-cargo">3</div>
    <div class="t-xs t-muted mt-4">Cargoes</div>
  </div>
</div>

<div class="owner-layout">

  <!-- SIDEBAR: Delivery List -->
  <aside class="owner-sidebar">
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);">
      <input type="text" class="input" placeholder="Search delivery or driver…" id="owner-search" style="font-size:12px;">
    </div>

    <div class="owner-sidebar-scroll" id="owner-fleet-container">
      <!-- Dynamic rows -->
    </div>

    <!-- Owner quick info -->
    <div style="padding:12px 16px;border-top:1px solid var(--border);background:var(--surface2);">
      <div class="t-xs t-muted mb-8">TRANSPARENCY LOG</div>
      <div class="t-xs" style="font-weight:600;">Last updated: <span id="last-updated">just now</span></div>
      <div class="t-xs t-muted mt-4">Location data refreshes every 10 sec</div>
      <button class="btn btn-ghost btn-sm btn-block mt-8"
              onclick="exportReport()">
        📋 Export Report (CSV)
      </button>
    </div>
  </aside>

  <!-- MAP + TIMELINE -->
  <div class="owner-right">
    <div id="owner-map"></div>

    <!-- Selected delivery timeline -->
    <div class="timeline-panel">
      <div class="flex justify-between items-center mb-8">
        <div class="t-label" style="margin:0;" id="timeline-title">Select a delivery</div>
        <div class="badge badge-neutral" style="font-size:9px;" id="timeline-status">---</div>
      </div>
      <div id="timeline-list">
         <!-- Dynamic timeline -->
      </div>
    </div>
  </div>

</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
async function renderOwnerDashboard() {
  const container = document.getElementById('owner-fleet-container');
  if (!container || !window.GlideGoDB) return;

  const fleet = await GlideGoDB.getAll(STORES.FLEET);
  const active = await GlideGoDB.get(STORES.DELIVERIES, 'active');
  const all = active ? [{ ...active, isActive: true }, ...fleet] : fleet;

  container.innerHTML = all.map(t => `
    <div class="delivery-row ${t.isActive ? 'selected' : ''}" data-truck="${t.plate}" onclick="selectOwnerTruck('${t.plate}')">
      <div class="flex justify-between items-start">
        <div>
          <div style="font-size:13px;font-weight:900;">${t.plate}</div>
          <div class="t-xs t-muted mt-4">${t.driver}</div>
        </div>
        <div class="badge badge-${t.status === 'DELAYED' ? 'warning' : t.status === 'AT STOP' ? 'secondary' : 'success'}" style="font-size:9px;">${t.status || 'ON TIME'}</div>
      </div>
      <div class="t-xs mt-8" style="font-weight:700;">${t.origin || 'N/A'} → ${t.destination || 'N/A'}</div>
      <div class="t-xs t-muted mt-4">${t.type || 'General'} · BOL-${Math.random().toString(36).substring(7).toUpperCase()}</div>

      <div style="margin-top:10px;">
        <div class="flex justify-between t-xs t-muted mb-4">
          <span>${t.isActive ? '42' : '100'}% complete</span>
          <span>${t.status === 'DELAYED' ? 'ETA +2h delayed' : 'On Track'}</span>
        </div>
        <div style="height:3px;background:var(--border);border-radius:2px;overflow:hidden;">
          <div style="height:100%;width:${t.isActive ? '42' : '100'}%;background:var(--${t.status === 'DELAYED' ? 'warning' : 'success'});"></div>
        </div>
      </div>
    </div>
  `).join('');

  // Update KPI counters
  document.getElementById('kpi-active').textContent = all.length;
  document.getElementById('kpi-ontime').textContent = all.filter(t => t.status !== 'DELAYED').length;
  document.getElementById('kpi-delayed').textContent = all.filter(t => t.status === 'DELAYED').length;
}

async function selectOwnerTruck(plate) {
  const t = await GlideGoDB.get(STORES.FLEET, plate) || await GlideGoDB.get(STORES.DELIVERIES, 'active');
  if (!t) return;

  document.querySelectorAll('.delivery-row').forEach(r => r.classList.toggle('selected', r.dataset.truck === plate));

  document.getElementById('timeline-title').textContent = `${t.plate} — ${t.origin} → ${t.destination}`;
  const sEl = document.getElementById('timeline-status');
  sEl.textContent = t.status || 'ON TIME';
  sEl.className = `badge badge-${t.status === 'DELAYED' ? 'warning' : t.status === 'AT STOP' ? 'secondary' : 'success'}`;

  const list = document.getElementById('timeline-list');
  list.innerHTML = `
    <div class="timeline-item">
      <div class="timeline-dot" style="background:var(--success);"></div>
      <div>
        <div style="font-weight:700;">Departed ${t.origin}</div>
        <div class="t-muted">System Log · GPS initialized</div>
      </div>
    </div>
    <div class="timeline-item">
      <div class="timeline-dot" style="background:var(--primary);"></div>
      <div>
        <div style="font-weight:700;">Current Status: ${t.status || 'En Route'}</div>
        <div class="t-muted">Last ping: Just now · Active Tracking</div>
      </div>
    </div>
  `;

  if (window.ownerMap && t.coords) {
    window.ownerMap.panTo(t.coords);
    window.ownerMap.setZoom(9);
  }
}

let ownerMap;
window.ownerMapInit = async function() {
  const DARK_STYLE = [
    { elementType: 'geometry', stylers: [{ color: '#0d1117' }] },
    { elementType: 'labels.text.fill', stylers: [{ color: '#8b949e' }] },
    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#21262d' }] },
    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0a0e14' }] },
  ];

  ownerMap = new google.maps.Map(document.getElementById('owner-map'), {
    center: { lat: 12.0, lng: 123.0 },
    zoom: 6,
    styles: DARK_STYLE,
    disableDefaultUI: false,
  });

  const fleet = await GlideGoDB.getAll(STORES.FLEET);
  const active = await GlideGoDB.get(STORES.DELIVERIES, 'active');
  const all = active ? [active, ...fleet] : fleet;

  all.forEach(truck => {
    if (!truck.coords) return;
    const color = truck.status === 'DELAYED' ? '#EAB308' : truck.status === 'AT STOP' ? '#3B82F6' : '#22C55E';
    new google.maps.Marker({
      position: truck.coords,
      map: ownerMap,
      title: truck.plate,
      icon: {
        path: 'M -10 -5 L 10 -5 L 12 0 L 10 5 L -10 5 Z',
        fillColor: color,
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        scale: 1.3,
      },
      label: { text: truck.plate, color: '#fff', fontSize: '10px', fontWeight: '900' }
    });
  });
};

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(renderOwnerDashboard, 500);
});

// Search filter
document.getElementById('owner-search')?.addEventListener('input', function () {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.delivery-row').forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

setInterval(() => {
  const el = document.getElementById('last-updated');
  if (el) el.textContent = new Date().toLocaleTimeString('en-PH');
}, 1000);

async function exportReport() {
  const fleet = await GlideGoDB.getAll(STORES.FLEET);
  const active = await GlideGoDB.get(STORES.DELIVERIES, 'active');
  const all = active ? [active, ...fleet] : fleet;

  const rows = [
    ['Plate', 'Driver', 'Origin', 'Destination', 'Status'],
    ...all.map(t => [t.plate, t.driver, t.origin, t.destination, t.status || 'ON TIME'])
  ];

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `traxhaul-fleet-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast('Fleet report exported', 'success');
}
</script>
<script
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API&libraries=places,geometry&callback=ownerMapInit&loading=async"
  async defer
></script>
</body>
</html>
</body>
</html>
